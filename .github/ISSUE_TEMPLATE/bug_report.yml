name: Bug Report
description: Report a bug or crash
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console Output
      description: Paste any error messages from the console window.
      render: shell

  - type: input
    id: gpu
    attributes:
      label: GPU
      description: e.g. GTX 1060 6GB
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SwiftDiffusion Version
      description: Visible in the window title and About tab.
    validations:
      required: true

  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - Dark
        - Amber
        - Nord
        - Dracula
        - Monokai
        - Forest
        - Ocean
